<body class="bg-background text-on-surface font-body-md">
<header class="bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(0,109,119,0.05)] sticky top-0 z-[100] w-full">
<div class="flex justify-between items-center w-full px-gutter-desktop max-w-max-width-desktop mx-auto h-20">
<a href="index.html" class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed">Fix It</a>
<a href="index.html" class="text-on-surface-variant font-label-lg text-label-lg hover:text-primary transition-colors">Volver al inicio</a>
</div>
</header>
<main class="py-16 px-gutter-mobile">
<div class="max-w-xl mx-auto">
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-3">Únete como Profesional</h1>
<p class="text-on-surface-variant font-body-md">Ofrece tus servicios y llega a más clientes en Mérida.</p>
</div>

<!-- Step 1: account creation, shown only if not logged in -->
<div id="account-step" class="bg-surface-container-lowest rounded-2xl shadow-[0px_4px_20px_rgba(0,109,119,0.08)] p-8 mb-6">
<h2 class="font-headline-sm text-headline-sm mb-4">Paso 1: Crea tu cuenta</h2>
<div id="account-error" class="hidden bg-error-container text-on-error-container rounded-lg p-3 mb-4 font-body-sm"></div>
<form id="account-form" class="space-y-4">
<div class="grid grid-cols-2 gap-3">
<input id="first_name" placeholder="Nombre" type="text" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
<input id="last_name" placeholder="Apellido" type="text" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<input id="email" placeholder="Correo electrónico" type="email" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
<input id="phone" placeholder="Teléfono" type="tel" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
<input id="password" placeholder="Contraseña" type="password" required minlength="6" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
<button type="submit" id="account-submit-btn" class="w-full py-3 bg-primary text-on-primary rounded-xl font-label-lg text-label-lg hover:brightness-110 transition-all active:scale-[0.98]">Crear cuenta y continuar</button>
</form>
<p class="text-center font-body-sm text-on-surface-variant mt-4">
¿Ya tienes cuenta? <a href="login.html?next=become-provider.html" class="text-primary font-semibold hover:underline">Inicia sesión</a>
</p>
</div>

<!-- Step 2: provider profile, shown once logged in -->
<div id="profile-step" class="hidden bg-surface-container-lowest rounded-2xl shadow-[0px_4px_20px_rgba(0,109,119,0.08)] p-8">
<h2 class="font-headline-sm text-headline-sm mb-4">Paso 2: Completa tu perfil profesional</h2>
<div id="profile-error" class="hidden bg-error-container text-on-error-container rounded-lg p-3 mb-4 font-body-sm"></div>
<div id="profile-success" class="hidden bg-secondary-container text-on-secondary-container rounded-lg p-3 mb-4 font-body-sm"></div>
<form id="profile-form" class="space-y-4">
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Cuéntanos sobre ti</label>
<textarea id="bio" rows="3" placeholder="Ej. Plomero certificado con 8 años de experiencia..." class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"></textarea>
</div>
<div class="grid grid-cols-2 gap-3">
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Años de experiencia</label>
<input id="experience_years" type="number" min="0" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Zona de servicio</label>
<input id="service_zone" type="text" placeholder="Ej. Norte de Mérida" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
</div>
<div class="grid grid-cols-2 gap-3">
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Precio mínimo (MXN/hr)</label>
<input id="price_min" type="number" min="0" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Precio máximo (MXN/hr)</label>
<input id="price_max" type="number" min="0" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
</div>
<button type="button" id="use-location-btn" class="w-full flex items-center justify-center gap-2 py-3 bg-secondary-container text-on-secondary-container rounded-xl font-label-lg text-label-lg hover:brightness-95 transition-all">
<span class="material-symbols-outlined">near_me</span>
<span id="location-status">Usar mi ubicación actual</span>
</button>
<button type="submit" id="profile-submit-btn" class="w-full py-3 bg-primary text-on-primary rounded-xl font-label-lg text-label-lg hover:brightness-110 transition-all active:scale-[0.98]">Crear perfil profesional</button>
</form>
</div>
</div>
</main>
<script src="js/auth.js"></script>
<script>
let currentLat = null;
let currentLng = null;

function showStep() {
    if (isLoggedIn()) {
        document.getElementById('account-step').classList.add('hidden');
        document.getElementById('profile-step').classList.remove('hidden');
    } else {
        document.getElementById('account-step').classList.remove('hidden');
        document.getElementById('profile-step').classList.add('hidden');
    }
}
showStep();

document.getElementById('account-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('account-error');
    const btn = document.getElementById('account-submit-btn');
    errorBox.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';

    try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await register({
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            email, password,
            phone: document.getElementById('phone').value,
            role: 'provider'
        });
        await login(email, password);
        showStep();
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta y continuar';
    }
});

document.getElementById('use-location-btn').addEventListener('click', () => {
    const status = document.getElementById('location-status');
    status.textContent = 'Obteniendo ubicación...';
    navigator.geolocation.getCurrentPosition(
        pos => {
            currentLat = pos.coords.latitude;
            currentLng = pos.coords.longitude;
            status.textContent = 'Ubicación guardada ✓';
        },
        () => { status.textContent = 'No se pudo obtener tu ubicación'; }
    );
});

document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('profile-error');
    const successBox = document.getElementById('profile-success');
    const btn = document.getElementById('profile-submit-btn');
    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
        const res = await fetch(`${API_BASE}/providers/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeader() },
            body: JSON.stringify({
                bio: document.getElementById('bio').value,
                experience_years: parseInt(document.getElementById('experience_years').value) || null,
                price_min: parseFloat(document.getElementById('price_min').value) || null,
                price_max: parseFloat(document.getElementById('price_max').value) || null,
                service_zone: document.getElementById('service_zone').value,
                latitude: currentLat,
                longitude: currentLng
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al crear el perfil');

        successBox.textContent = '¡Perfil creado! Ya apareces en las búsquedas de Fix It.';
        successBox.classList.remove('hidden');
        btn.textContent = 'Perfil creado ✓';
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Crear perfil profesional';
    }
});
</script>
</body></html>
