<body class="bg-background text-on-surface font-body-md">
<header class="bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(0,109,119,0.05)] sticky top-0 z-[100] w-full">
<div class="flex justify-between items-center w-full px-gutter-desktop max-w-max-width-desktop mx-auto h-20">
<a href="index.html" class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed">Fix It</a>
<a href="index.html" class="text-on-surface-variant font-label-lg text-label-lg hover:text-primary transition-colors">Volver al inicio</a>
</div>
</header>
<main class="flex items-center justify-center py-20 px-gutter-mobile">
<div class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-[0px_4px_20px_rgba(0,109,119,0.08)] p-8">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Crear Cuenta</h1>
<p class="text-on-surface-variant font-body-sm mb-8">Únete a Fix It en minutos</p>
<div id="error-box" class="hidden bg-error-container text-on-error-container rounded-lg p-3 mb-4 font-body-sm"></div>
<form id="register-form" class="space-y-4">
<div class="grid grid-cols-2 gap-3">
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Nombre</label>
<input id="first_name" type="text" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Apellido</label>
<input id="last_name" type="text" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Correo electrónico</label>
<input id="email" type="email" required class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Teléfono</label>
<input id="phone" type="tel" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Ciudad</label>
<input id="city" type="text" value="Mérida" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Contraseña</label>
<input id="password" type="password" required minlength="6" class="w-full px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-md"/>
</div>
<button type="submit" id="submit-btn" class="w-full py-3 bg-primary text-on-primary rounded-xl font-label-lg text-label-lg hover:brightness-110 transition-all active:scale-[0.98]">Registrarse</button>
</form>
<p class="text-center font-body-sm text-on-surface-variant mt-6">
¿Ya tienes cuenta? <a href="login.html" class="text-primary font-semibold hover:underline">Inicia sesión</a>
</p>
</div>
</main>
<script src="js/auth.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');
    errorBox.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creando cuenta...';

    try {
        await register({
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            phone: document.getElementById('phone').value,
            city: document.getElementById('city').value,
            role: 'client'
        });
        await login(document.getElementById('email').value, document.getElementById('password').value);
        window.location.href = 'index.html';
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Registrarse';
    }
});
</script>
