<script src="js/auth.js"></script>
<script>
if (!isLoggedIn()) {
    window.location.href = 'login.html';
} else {

let currentUser = null;
let currentProvider = null;

async function loadProfile() {
    const res = await fetch(`${API_BASE}/auth/me`, { headers: authHeader() });
    if (!res.ok) {
        clearSession();
        window.location.href = 'login.html';
        return;
    }
    currentUser = await res.json();

    document.getElementById('profile-heading').textContent = `${currentUser.first_name} ${currentUser.last_name}`;
    document.getElementById('profile-email').textContent = currentUser.email;
    document.getElementById('first_name').value = currentUser.first_name || '';
    document.getElementById('last_name').value = currentUser.last_name || '';
    document.getElementById('phone').value = currentUser.phone || '';
    document.getElementById('city').value = currentUser.city || '';

    if (currentUser.avatar_url) {
        document.getElementById('avatar-preview').src = currentUser.avatar_url;
        document.getElementById('avatar-preview').classList.remove('hidden');
        document.getElementById('avatar-fallback').classList.add('hidden');
    }

    // Look for an existing provider profile belonging to this user
    const provRes = await fetch(`${API_BASE}/providers/`);
    const providers = await provRes.json();
    currentProvider = providers.find(p => p.user_id === currentUser.id);

    if (currentProvider) {
        document.getElementById('provider-section').classList.remove('hidden');
        document.getElementById('services-section').classList.remove('hidden');
        document.getElementById('bio').value = currentProvider.bio || '';
        document.getElementById('experience_years').value = currentProvider.experience_years || '';
        document.getElementById('service_zone').value = currentProvider.service_zone || '';
        document.getElementById('price_min').value = currentProvider.price_min || '';
        document.getElementById('price_max').value = currentProvider.price_max || '';
        document.getElementById('provider-rating').innerHTML =
            `<span class="material-symbols-outlined text-[#FFB703] text-[18px]" style="font-variation-settings: 'FILL' 1;">star</span> ${currentProvider.avg_rating.toFixed(1)} (${currentProvider.review_count})`;
        loadCategories();
        loadMyServices();
    } else {
        document.getElementById('become-provider-cta').classList.remove('hidden');
    }
}
loadProfile();

async function loadCategories() {
    try {
        const res = await fetch(`${API_BASE}/categories/`);
        const categories = await res.json();
        document.getElementById('service-category').innerHTML =
            categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    } catch (err) {
        console.error('Could not load categories', err);
    }
}

async function loadMyServices() {
    const listEl = document.getElementById('services-list');
    try {
        const res = await fetch(`${API_BASE}/services/`);
        const allServices = await res.json();
        const myServices = allServices.filter(s => s.provider_id === currentProvider.id);

        if (!myServices.length) {
            listEl.innerHTML = '<p class="text-on-surface-variant font-body-sm">Aún no tienes servicios. Agrega el primero abajo.</p>';
            return;
        }

        listEl.innerHTML = myServices.map(s => `
            <div class="flex justify-between items-center bg-surface-container-low rounded-xl px-4 py-3">
                <div>
                    <p class="font-label-lg text-label-lg text-on-surface">${s.name}</p>
                    <p class="text-on-surface-variant font-body-sm">$${s.price} MXN${s.duration_min ? ' · ' + s.duration_min + ' min' : ''}</p>
                </div>
                <button onclick="deleteService('${s.id}')" class="text-error hover:bg-error-container rounded-lg p-2 transition-colors">
                    <span class="material-symbols-outlined text-[20px]">delete</span>
                </button>
            </div>
        `).join('');
    } catch (err) {
        listEl.innerHTML = '<p class="text-error font-body-sm">No se pudieron cargar tus servicios.</p>';
    }
}

document.getElementById('service-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('services-error');
    const btn = document.getElementById('service-submit-btn');
    errorBox.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Agregando...';

    try {
        const res = await fetch(`${API_BASE}/services/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeader() },
            body: JSON.stringify({
                category_id: document.getElementById('service-category').value,
                name: document.getElementById('service-name').value,
                description: document.getElementById('service-description').value,
                price: parseFloat(document.getElementById('service-price').value),
                duration_min: parseInt(document.getElementById('service-duration').value) || null
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al agregar el servicio');

        document.getElementById('service-form').reset();
        loadMyServices();
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Agregar servicio';
    }
});

async function deleteService(serviceId) {
    if (!confirm('¿Eliminar este servicio?')) return;
    try {
        const res = await fetch(`${API_BASE}/services/${serviceId}`, {
            method: 'DELETE',
            headers: authHeader()
        });
        if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || 'Error al eliminar el servicio');
        }
        loadMyServices();
    } catch (err) {
        alert(err.message);
    }
}

document.getElementById('info-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('info-error');
    const successBox = document.getElementById('info-success');
    const btn = document.getElementById('info-submit-btn');
    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
        const res = await fetch(`${API_BASE}/users/${currentUser.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', ...authHeader() },
            body: JSON.stringify({
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al guardar');

        successBox.textContent = 'Cambios guardados correctamente.';
        successBox.classList.remove('hidden');
        loadProfile();
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar cambios';
    }
});

let cropper = null;

document.getElementById('avatar_file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const cropImage = document.getElementById('crop-image');
    cropImage.src = URL.createObjectURL(file);

    document.getElementById('crop-modal').classList.remove('hidden');
    document.getElementById('crop-modal').classList.add('flex');

    if (cropper) cropper.destroy();
    cropper = new Cropper(cropImage, {
        aspectRatio: 1,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 1,
        background: false,
        cropBoxMovable: true,
        cropBoxResizable: true
    });

    // reset the input so selecting the same file again still fires 'change'
    e.target.value = '';
});

document.getElementById('crop-cancel-btn').addEventListener('click', () => {
    document.getElementById('crop-modal').classList.add('hidden');
    document.getElementById('crop-modal').classList.remove('flex');
    if (cropper) { cropper.destroy(); cropper = null; }
});

document.getElementById('crop-confirm-btn').addEventListener('click', async () => {
    if (!cropper) return;
    const status = document.getElementById('avatar-upload-status');
    const confirmBtn = document.getElementById('crop-confirm-btn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Subiendo...';

    try {
        const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
        if (!blob) throw new Error('No se pudo procesar la imagen');

        const formData = new FormData();
        formData.append('image', blob, 'avatar.jpg');

        const res = await fetch(`${API_BASE}/users/${currentUser.id}/avatar`, {
            method: 'POST',
            headers: authHeader(),
            body: formData
        });

        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
            throw new Error(`El servidor rechazó la imagen (código ${res.status}). Intenta con una foto más pequeña.`);
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al subir la imagen');

        document.getElementById('avatar-preview').src = data.avatar_url;
        document.getElementById('avatar-preview').classList.remove('hidden');
        document.getElementById('avatar-fallback').classList.add('hidden');
        status.textContent = 'Foto actualizada ✓';

        document.getElementById('crop-modal').classList.add('hidden');
        document.getElementById('crop-modal').classList.remove('flex');
        cropper.destroy();
        cropper = null;
    } catch (err) {
        status.textContent = err.message;
    } finally {
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Usar esta foto';
    }
});

document.getElementById('provider-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('provider-error');
    const successBox = document.getElementById('provider-success');
    const btn = document.getElementById('provider-submit-btn');
    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
        const res = await fetch(`${API_BASE}/providers/${currentProvider.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', ...authHeader() },
            body: JSON.stringify({
                bio: document.getElementById('bio').value,
                experience_years: parseInt(document.getElementById('experience_years').value) || null,
                service_zone: document.getElementById('service_zone').value,
                price_min: parseFloat(document.getElementById('price_min').value) || null,
                price_max: parseFloat(document.getElementById('price_max').value) || null
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al guardar');

        successBox.textContent = 'Perfil profesional actualizado.';
        successBox.classList.remove('hidden');
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar perfil profesional';
    }
});

} // end else (isLoggedIn)
</script>
</body></html>
