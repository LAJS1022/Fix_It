<body class="bg-background text-on-surface font-body-md">
<header class="bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(0,109,119,0.05)] sticky top-0 z-[100] w-full">
<div class="flex justify-between items-center w-full px-gutter-desktop max-w-max-width-desktop mx-auto h-20">

<main class="py-12 px-gutter-mobile">
<div id="loading-state" class="max-w-3xl mx-auto text-center py-20 text-on-surface-variant">Cargando perfil...</div>
<div id="not-found-state" class="hidden max-w-3xl mx-auto text-center py-20">

</div>
<div id="profile-content" class="hidden max-w-3xl mx-auto space-y-6">

<div class="bg-surface-container-lowest rounded-2xl shadow-[0px_4px_20px_rgba(0,109,119,0.08)] p-8">
<div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">
<div class="w-24 h-24 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center shrink-0 overflow-hidden">
<img id="avatar" class="w-full h-full object-cover hidden" src=""/>
<span id="avatar-fallback" class="material-symbols-outlined text-[48px]">person</span>
</div>
<div class="flex-1 text-center sm:text-left">
<div class="flex items-center justify-center sm:justify-start gap-2 mb-1">
<h1 class="font-headline-lg text-headline-lg text-on-surface" id="provider-name"></h1>
<span id="verified-badge" class="hidden material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-wider mb-2" id="provider-category"></p>
<div class="flex items-center justify-center sm:justify-start gap-2 mb-4">
<span class="material-symbols-outlined text-[#FFB703]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-bold" id="provider-rating"></span>
<span class="text-on-surface-variant" id="provider-review-count"></span>
</div>
<div class="flex items-center justify-center sm:justify-start gap-1 text-on-surface-variant font-body-sm">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<span id="provider-zone"></span>
</div>
</div>
<div class="text-center sm:text-right">
<span class="text-label-sm text-on-surface-variant uppercase tracking-wider block">Desde</span>
<span class="font-bold text-primary text-headline-sm" id="provider-price"></span>
<button class="w-full mt-3 py-3 px-6 bg-primary text-on-primary rounded-xl font-label-lg text-label-lg hover:brightness-110 transition-all active:scale-[0.98]" onclick="alert('La función de reservas estará disponible próximamente.')">Reservar ahora</button>
</div>
</div>
</div>

</div>

<div id="reviews-list" class="space-y-4"></div>
<p id="no-reviews" class="hidden text-on-surface-variant font-body-sm">Este profesional aún no tiene reseñas.</p>
</div>

<script src="js/auth.js"></script>
<script>
const providerId = new URLSearchParams(window.location.search).get('id');

async function loadProviderProfile() {
    if (!providerId) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('not-found-state').classList.remove('hidden');
        return;
    }

    const res = await fetch(`${API_BASE}/providers/${providerId}`);
    if (!res.ok) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('not-found-state').classList.remove('hidden');
        return;
    }
    const p = await res.json();

    document.getElementById('provider-name').textContent = p.name;
    document.getElementById('provider-category').textContent = p.category || '';
    document.getElementById('provider-rating').textContent = p.avg_rating.toFixed(1);
    document.getElementById('provider-review-count').textContent = `(${p.review_count} reseñas)`;
    document.getElementById('provider-zone').textContent = p.service_zone || 'Zona no especificada';
    document.getElementById('provider-price').textContent =
        `$${p.price_min ?? '--'} - $${p.price_max ?? '--'} MXN/hr`;
    document.getElementById('provider-bio').textContent = p.bio || 'Este profesional aún no ha agregado una descripción.';
    document.getElementById('provider-experience').textContent =
        p.experience_years ? `${p.experience_years} años de experiencia` : '';

    if (p.verified) document.getElementById('verified-badge').classList.remove('hidden');
    if (p.photo_url) {
        document.getElementById('avatar').src = p.photo_url;
        document.getElementById('avatar').classList.remove('hidden');
        document.getElementById('avatar-fallback').classList.add('hidden');
    }

    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('profile-content').classList.remove('hidden');

    loadGallery();
    loadReviews();
}

async function loadGallery() {
    try {
        const res = await fetch(`${API_BASE}/providers/${providerId}/gallery`);
        const items = await res.json();
        if (!items.length) return;

        document.getElementById('gallery-section').classList.remove('hidden');
        document.getElementById('gallery-grid').innerHTML = items.map(g => `
            <img src="${g.image_url}" alt="${g.caption || 'Trabajo realizado'}" class="w-full h-32 object-cover rounded-lg"/>
        `).join('');
    } catch (err) {
        console.error('Could not load gallery', err);
    }
}

async function loadReviews() {
    try {
        const res = await fetch(`${API_BASE}/reviews/`);
        const allReviews = await res.json();
        const providerReviews = allReviews.filter(r => r.provider_id === providerId);

        if (!providerReviews.length) {
            document.getElementById('no-reviews').classList.remove('hidden');
            return;
        }

        const withNames = await Promise.all(providerReviews.map(async r => {
            try {
                const uRes = await fetch(`${API_BASE}/users/${r.client_id}`);
                const u = await uRes.json();
                return { ...r, clientName: `${u.first_name} ${u.last_name}` };
            } catch {
                return { ...r, clientName: 'Cliente' };
            }
        }));

        document.getElementById('reviews-list').innerHTML = withNames.map(r => `
            <div class="border-b border-outline-variant pb-4 last:border-0">
                <div class="flex items-center justify-between mb-1">
                    <span class="font-label-lg text-label-lg text-on-surface">${r.clientName}</span>
                    <span class="flex items-center gap-1 text-[#FFB703]">
                        ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                    </span>
                </div>
                <p class="text-on-surface-variant font-body-sm">${r.comment || ''}</p>
            </div>
        `).join('');
    } catch (err) {
        console.error('Could not load reviews', err);
    }
}

loadProviderProfile();
</script>
